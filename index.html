<html>
  <head>
    <title>Website</title>
  </head>
  <body>
    <h1>Welcome to Our Website</h1>
    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>
        <form class="contact-form">
            <h2>📝Got Questions?Contact Us Today!📝</h2>
            <div class="contact-fields">
            </div>
                <label for="name">Your Name</label>
                <input type="text" id="name" placeholder="FirstName LastName"/>
            </div>  
            <br>
            <div> 
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="youremail@email.com"/>
            </div>
            <br>
            <div>
                <label for="message">Message</label>
                <textarea rows="4" id="message" placeholder="Leave us your message here. Can't wait to hear from you!"></textarea>
            </div>
        </form>
    <footer>
        <p>&copy; 2025 My Website</p>
    </footer>
  </body>
</html>
